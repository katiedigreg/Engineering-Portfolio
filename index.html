<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS & SVG Mountain Landscape</title>
    <style>
        /* Reset margins and create the sunset sky */
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #1a2a6c, #b21f1f, #fdbb2d);
            height: 100vh;
            display: flex;
            align-items: flex-end; /* Pushes the mountains to the bottom */
            overflow: hidden;
        }

        /* Container to control the height of the mountains */
        .mountain-container {
            width: 100%;
            height: 50vh; /* Takes up the bottom half of the screen */
            position: relative;
        }

        /* Make the SVG stretch to fit the container */
        svg {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>

    <div class="mountain-container">
        <svg viewBox="0 0 1200 400" preserveAspectRatio="none">
            
            <path d="M0,400 L0,200 L150,100 L300,250 L500,50 L700,200 L900,80 L1200,250 L1200,400 Z" 
                  fill="#2c3e50" opacity="0.6"/>
            
            <path d="M0,400 L0,280 L200,150 L400,300 L650,100 L850,280 L1100,120 L1200,200 L1200,400 Z" 
                  fill="#1a252f" opacity="0.8"/>
            
            <path d="M0,400 L0,350 L250,200 L450,320 L750,150 L1000,350 L1200,280 L1200,400 Z" 
                  fill="#0d1318"/>
                  
        </svg>
    </div>

</body>
</html>
